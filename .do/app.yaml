# DigitalOcean App Platform spec for Keystone.
# Create: doctl apps create --spec .do/app.yaml
name: keystone
region: nyc
services:
  - name: web
    dockerfile_path: Dockerfile
    github:
      repo: rajmodi262/keystone
      branch: main
      deploy_on_push: true
    http_port: 3000
    instance_size_slug: basic-xxs
    instance_count: 1
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: NEXTAUTH_URL
        scope: RUN_TIME
        value: ${APP_URL}
      - key: NEXTAUTH_SECRET
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_WITH_OPENSSL_RAND_BASE64_32
jobs:
  - name: migrate
    kind: PRE_DEPLOY
    dockerfile_path: Dockerfile
    github:
      repo: rajmodi262/keystone
      branch: main
    run_command: npx prisma migrate deploy
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
databases:
  - name: db
    engine: PG
    version: "16"
    production: false
