services:
  db:
    image: pgvector/pgvector:pg16
    container_name: keystone-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: keystone
      POSTGRES_PASSWORD: keystone
      POSTGRES_DB: keystone
    ports:
      - "5433:5432"
    volumes:
      - keystone_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keystone -d keystone"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  keystone_pgdata:
